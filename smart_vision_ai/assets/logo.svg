<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#001a4d"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Glow halo -->
  <ellipse cx="90" cy="80" rx="70" ry="40" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Eye outline -->
  <path d="M10 80 C40 20, 140 20, 170 80 C140 140, 40 140, 10 80 Z"
        fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Iris -->
  <circle cx="90" cy="80" r="28" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="90" cy="80" r="13" fill="#000d1a"/>
  <!-- AI circuit dot -->
  <circle cx="96" cy="73" r="4.5" fill="#00d4ff" opacity="0.95"/>
  <circle cx="96" cy="73" r="2" fill="white"/>
  <!-- Scan ring -->
  <circle cx="90" cy="80" r="20" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Nav path -->
  <path d="M90 115 L90 158" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 4" opacity="0.7"/>
  <path d="M90 155 L72 170" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
  <path d="M90 155 L108 170" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
  <!-- Lashes left -->
  <path d="M30 55 L50 66" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M22 75 L46 76" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M30 95 L50 88" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Lashes right -->
  <path d="M150 55 L130 66" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M158 75 L134 76" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M150 95 L130 88" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
